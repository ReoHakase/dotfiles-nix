# Self-hosted Renovate。flake.lock とカスタム Nix（固定出力 fetchurl の hash など）を PR で追従。
# post-upgrade で scripts/renovate/*（curl + nix hash、bundled の nix-update）を叩くので Nix を入れる。
name: Renovate

on:
  schedule:
    # 03:00 JST = 18:00 UTC。flake 入力ロックと Vicinae AppImage（fetchurl の hash を含む）などを PR。
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Renovate log level"
        required: false
        default: "info"
        type: choice
        options:
          - debug
          - info
          - warn
          - error
      dryRun:
        description: "Renovate dry-run mode (empty=off, full, lookup, extract)"
        required: false
        default: ""
        type: string

concurrency:
  group: renovate-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  # PAT の「workflow」スコープとは別物。ワークフロー YAML の更新は GITHUB_TOKEN で
  # contents:write + リポ設定（Actions の読み書き権限）に依存。permissions に workflows キーは無い。
  # https://docs.github.com/actions/writing-workflows/workflow-syntax-for-github-actions#permissions

jobs:
  renovate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # post-upgrade tasks で nix-update / nix-prefetch-url を使うため Nix を入れる。
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14

      # 将来 npm ベースの post-upgrade を足すとき用（Renovate 本体は Action 側の Node を使用）。
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.16.0"

      # post-upgrade で使うもの: nix-update（nix-update-flake-package.sh）、nix-prefetch、curl など。
      - name: Install helper tools via Nix
        run: |
          nix profile install \
            nixpkgs#nix-update \
            nixpkgs#nix-prefetch \
            nixpkgs#jq \
            nixpkgs#gnused \
            nixpkgs#curl

      - name: Run Renovate
        uses: renovatebot/github-action@8217b3fc286df088d7c27f3255fe8414463bc0fd # v46.1.15
        env:
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dryRun }}
          # repository 情報を明示。self-hosted でも必須。
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          # Self-hosted/global-only options. Keep them out of .github/renovate.json5
          # because Renovate also reads that file as repository config.
          RENOVATE_ALLOW_POST_UPGRADE_COMMAND_TEMPLATING: "true"
          RENOVATE_ALLOWED_COMMANDS: '["^bash scripts/renovate/bump-vicinae-appimage\\.sh [-\\.0-9A-Za-z+]+$"]'
        with:
          # Prefer a PAT or GitHub App token so Renovate PRs can trigger normal
          # PR/push workflows. github.token is a low-privilege fallback.
          token: ${{ secrets.RENOVATE_TOKEN || github.token }}
