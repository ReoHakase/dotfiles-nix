name: Nix

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: nix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Check Nix formatting and lint
        run: |
          mapfile -t nix_files < <(git ls-files "*.nix")
          nix --option warn-dirty false develop -c nixfmt --check "${nix_files[@]}"
          nix --option warn-dirty false develop -c sh -c "for file do statix check \"\$file\"; done" sh "${nix_files[@]}"
          nix --option warn-dirty false develop -c deadnix --fail "${nix_files[@]}"

      - name: Check flake lock
        run: nix --option warn-dirty false flake lock --no-update-lock-file

  linux-home:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Evaluate Linux Home Manager output
        run: nix eval --raw '.#packages.x86_64-linux.home-reohakuta-kcvl.drvPath'

  darwin-system:
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Evaluate Darwin system output
        run: nix eval --raw '.#darwinConfigurations.reohakase.system.drvPath'
