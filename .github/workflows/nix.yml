# macOS: evaluate + build darwinSystem. Linux: build Home Manager activation package.
# No switch: root / activation / Homebrew are machine-local.
name: Nix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: nix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flake-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Flake check
        run: nix flake check

      - name: Build darwin system (no switch)
        run: nix build '.#darwinConfigurations.reohakase.system' --no-link --print-build-logs

  home-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Build Home Manager activation (x86_64-linux)
        run: nix build '.#packages.x86_64-linux.home-reohakuta-kcvl' --no-link --print-build-logs
